# =============================================================================
# Electrica Ventas - Filtro Fail2Ban para webhooks de 360dialog
# Instalar en: /etc/fail2ban/filter.d/electrica-webhook.conf
#
# Detecta:
#   - Requests al webhook sin cabecera de firma (X-Hub-Signature-256)
#   - Requests con firma inválida (respuesta 401/403 del API)
#   - Flood de requests al endpoint /webhook/wa/
# =============================================================================

[INCLUDES]
before = common.conf

[Definition]

# Prefijo común de log de Nginx (combined log format)
# Formato: IP - - [fecha] "METHOD /path HTTP/1.1" STATUS bytes "referer" "user-agent"

# Detectar respuestas 401 (sin firma o firma inválida) al endpoint webhook
failregex = ^<HOST> - .+ "(POST|GET) /webhook/wa/[a-zA-Z0-9\-]+ HTTP/[12]\.[01]" (401|403) .+$

# Detectar intentos de acceso con métodos no permitidos al webhook
            ^<HOST> - .+ "(GET|PUT|DELETE|PATCH|HEAD|OPTIONS) /webhook/wa/[a-zA-Z0-9\-]+ HTTP/[12]\.[01]" (405|400) .+$

# Detectar rate limit excedido (nginx devuelve 429 o 503 cuando se activa limit_req)
            ^<HOST> - .+ "POST /webhook/wa/[a-zA-Z0-9\-]+ HTTP/[12]\.[01]" (429|503) .+$

# Ignorar IPs conocidas (se puede extender con ignoreip en jail.local)
ignoreregex =

# Codificación del log
encoding = UTF-8
