# Electrica Ventas - Nginx Configuration
# api.electrica.mx
# Requiere: nginx >= 1.18, certbot configurado

# --- Rate limiting zones ---
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=300r/s;

# --- Gzip compression ---
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

# --- Redirect HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name api.electrica.mx;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS main server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.electrica.mx;

    # --- SSL (Let's Encrypt - certbot actualiza estas rutas) ---
    ssl_certificate     /etc/letsencrypt/live/api.electrica.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.electrica.mx/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Logs ---
    access_log /var/log/nginx/electrica-access.log;
    error_log  /var/log/nginx/electrica-error.log warn;

    # --- Security headers ---
    add_header X-Frame-Options           "DENY"                            always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # --- Bloquear acceso directo a puertos internos desde headers ---
    if ($http_x_forwarded_for ~* "(3000|3001|5432|6379)") {
        return 403;
    }

    # --- Webhook: 360dialog y otros proveedores ---
    location /webhook/ {
        limit_req zone=webhook_limit burst=200 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Conservar el body intacto para validación de firma HMAC
        proxy_request_buffering off;
        proxy_buffering         off;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;

        proxy_hide_header X-Powered-By;
    }

    # --- API REST (Fastify) ---
    location /api/ {
        limit_req zone=api_limit burst=600 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 5s;

        proxy_hide_header X-Powered-By;
    }

    # --- WebSocket ---
    location /ws {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Headers obligatorios para upgrade WebSocket
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 5s;

        proxy_hide_header X-Powered-By;
    }

    # --- Health check (sin rate limit) ---
    location /health {
        proxy_pass         http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

    # --- Denegar rutas sensibles ---
    location ~ /\.(env|git|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    # --- Denegar acceso a raíz (no hay frontend en este dominio) ---
    location = / {
        return 404;
    }
}
