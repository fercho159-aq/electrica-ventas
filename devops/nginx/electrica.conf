# =============================================================================
# Electrica Ventas — nginx site
# Ubicar en: /etc/nginx/sites-available/electrica
# Symlink:   ln -s /etc/nginx/sites-available/electrica /etc/nginx/sites-enabled/
# Dominio:   electrica-ventas.duckdns.org → 31.220.109.7
# Backend:   127.0.0.1:3010 (PM2 electrica-api)
# Frontend:  /var/www/electrica-ventas (archivos estáticos servidos directo)
# =============================================================================

# Rate limit para el webhook de WhatsApp (zona global, declarar 1 vez)
limit_req_zone $binary_remote_addr zone=electrica_webhook:10m rate=100r/s;

# Mapa para upgrade de WebSocket
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name electrica-ventas.duckdns.org;
    # Certbot agrega el redirect a HTTPS automáticamente
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name electrica-ventas.duckdns.org;

    # ── Frontend estático ────────────────────────────────────────────────────
    root /var/www/electrica-ventas;
    index index.html;

    # Archivos del prototipo (index.html, *.jsx, styles.css, api.js)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API REST ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Webhook WhatsApp (Meta) — con rate limit ────────────────────────────
    location /webhook/ {
        limit_req zone=electrica_webhook burst=50 nodelay;
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Importante: Meta exige respuesta < 5s; no bufferear de más
        proxy_read_timeout 10s;
    }

    # ── WebSocket (tiempo real del inbox) ───────────────────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;   # conexiones largas
        proxy_send_timeout 3600s;
    }

    # ── Bull Board (admin de colas) — opcional, protégelo ───────────────────
    location /admin/queues {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Auth básica ya la maneja el backend (BULL_BOARD_USER/PASS)
    }

    # ── Seguridad ────────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    client_max_body_size 16M;

    # ── SSL (rellenado por certbot) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/electrica-ventas.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/electrica-ventas.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/electrica-access.log;
    error_log  /var/log/nginx/electrica-error.log;
}
